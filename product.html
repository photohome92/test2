<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
<h1>Product Details</h1>
</div>

<div class="product-page">

<img id="img1">
<img id="img2">

<h2 id="name"></h2>

<h2 id="price"></h2>

<button onclick="addToCart()">Add to Cart</button>

<p>📞 03338181082</p>

</div>

<script>

let id = localStorage.getItem("product");

/* ALL PRODUCTS DATABASE */
let products = {

frames:{name:"Frames",price:1599,desc:"Premium photo frThese frames are magical! Watch them change and transform your space in an instant.ames"},
mirrorframes:{name:"Mirror Frames",price:2000,desc:"Beautiful mirror frames that add elegance and style to any room. Perfect for your home or office!"},

heartmug:{name:"Heart Mug",price:1199,desc:"Show your love with a heart-shaped handle mug. A cute way to enjoy your favorite drink! mug"},
magicmug:{name:"Magic Mug",price:1199,desc:"A mug that changes! Watch your design appear when you pour in your hot drink. It's magic!l mug"},

shirtwhite:{name:"White Shirt",price:799,desc:"A crisp white shirt is a must-have for any wardrobe. Comfortable, stylish, and always in fashion!"},

let p = products[id];

/* SAFETY */
if(!p){
document.body.innerHTML="<h2 style='text-align:center;color:red;margin-top:50px'>Product Not Found</h2>";
throw new Error("Invalid product");
}

document.getElementById("name").innerText=p.name;
document.getElementById("desc").innerText=p.desc;
document.getElementById("price").innerText="Rs "+p.price;

/* IMAGE SYSTEM (IMPORTANT FIX) */
document.getElementById("img1").src="images/"+id+"1.jpg";
document.getElementById("img2").src="images/"+id+"2.jpg";

/* CART */
function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:p.name,
price:p.price
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");
}

</script>

</body>
</html>
